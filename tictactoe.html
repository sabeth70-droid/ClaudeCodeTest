<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5em;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 18px rgba(233, 69, 96, 0.6);
    }

    #reset {
      margin-top: 1.8rem;
      padding: 0.7rem 2.2rem;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 1px;
    }

    #reset:hover {
      background: #c73652;
      transform: scale(1.04);
    }

    #score {
      display: flex;
      gap: 2.5rem;
      margin-bottom: 1.2rem;
      font-size: 1rem;
      color: #aaa;
    }

    #score span strong { font-size: 1.4rem; }
    #score .sx strong { color: #e94560; }
    #score .so strong { color: #a8dadc; }
    #score .sd strong { color: #eee; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="score">
    <div class="sx">X wins: <strong id="xwins">0</strong></div>
    <div class="sd">Draws: <strong id="draws">0</strong></div>
    <div class="so">O wins: <strong id="owins">0</strong></div>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="reset">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, over;
    let score = { X: 0, O: 0, D: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const xwins = document.getElementById('xwins');
    const owins = document.getElementById('owins');
    const draws = document.getElementById('draws');

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      over = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      status.textContent = "X's turn";
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(Boolean)) return { winner: null, line: [] };
      return null;
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (over || board[i]) return;

        board[i] = current;
        cell.textContent = current;
        cell.classList.add(current.toLowerCase(), 'taken');

        const result = checkWinner();
        if (result) {
          over = true;
          if (result.winner) {
            result.line.forEach(idx => cells[idx].classList.add('win'));
            status.textContent = `${result.winner} wins!`;
            score[result.winner]++;
          } else {
            status.textContent = "It's a draw!";
            score.D++;
          }
          xwins.textContent = score.X;
          owins.textContent = score.O;
          draws.textContent = score.D;
          return;
        }

        current = current === 'X' ? 'O' : 'X';
        status.textContent = `${current}'s turn`;
      });
    });

    document.getElementById('reset').addEventListener('click', init);

    init();
  </script>
</body>
</html>
